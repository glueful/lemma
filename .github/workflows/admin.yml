name: Admin SPA

on:
  push:
    branches: [main, dev]
    paths: ['admin/**', '.github/workflows/admin.yml']
  pull_request:
    paths: ['admin/**', '.github/workflows/admin.yml']

defaults:
  run:
    working-directory: admin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build-only
